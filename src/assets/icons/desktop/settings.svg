<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="none" />

  <!-- Gear body -->
  <rect x="10" y="9" width="12" height="14" fill="#a1a1aa" />
  <rect x="9" y="10" width="14" height="12" fill="#a1a1aa" />
  <rect x="8" y="11" width="16" height="10" fill="#a1a1aa" />
  <rect x="11" y="8" width="10" height="16" fill="#a1a1aa" />
  <rect x="7" y="7" width="3" height="3" fill="#a1a1aa" />
  <rect x="22" y="7" width="3" height="3" fill="#a1a1aa" />
  <rect x="7" y="22" width="3" height="3" fill="#a1a1aa" />
  <rect x="22" y="22" width="3" height="3" fill="#a1a1aa" />

  <!-- 8 teeth -->
  <rect x="13" y="3" width="6" height="5" fill="#d4d4d8" stroke="#000" stroke-width="1" />
  <rect x="13" y="24" width="6" height="5" fill="#d4d4d8" stroke="#000" stroke-width="1" />
  <rect x="3" y="13" width="5" height="6" fill="#d4d4d8" stroke="#000" stroke-width="1" />
  <rect x="24" y="13" width="5" height="6" fill="#d4d4d8" stroke="#000" stroke-width="1" />
  <rect x="5" y="5" width="5" height="5" fill="#d4d4d8" stroke="#000" stroke-width="1" />
  <rect x="22" y="5" width="5" height="5" fill="#d4d4d8" stroke="#000" stroke-width="1" />
  <rect x="5" y="22" width="5" height="5" fill="#d4d4d8" stroke="#000" stroke-width="1" />
  <rect x="22" y="22" width="5" height="5" fill="#d4d4d8" stroke="#000" stroke-width="1" />

  <!-- Inner ring + hub -->
  <rect x="11" y="11" width="10" height="10" fill="#71717a" />
  <rect x="12" y="12" width="8" height="8" fill="#fff" stroke="#000" stroke-width="1" />
  <rect x="14" y="14" width="4" height="4" fill="#71717a" />
</svg>
