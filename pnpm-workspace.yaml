# blockExoticSubdeps: no git/tarball transitive deps.
# Release-age: Dependabot waits 7 days before opening update PRs (dependabot.yml).
# pnpm enforces 1 day on install and re-validates the lockfile in CI.
blockExoticSubdeps: true
minimumReleaseAge: 1440 # 1 day in minutes
minimumReleaseAgeStrict: true

allowBuilds:
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true
onlyBuiltDependencies:
  - esbuild
  - sharp
