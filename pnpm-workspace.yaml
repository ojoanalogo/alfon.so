# blockExoticSubdeps: no git/tarball transitive deps.
# Release-age cooldown is handled by Dependabot (7-day cooldown in dependabot.yml);
# pnpm minimumReleaseAge also re-validates the lockfile and breaks CI when deps were
# updated within the window.
blockExoticSubdeps: true
allowBuilds:
  esbuild: true
  sharp: true
minimumReleaseAgeExclude:
  - '@astrojs/internal-helpers@0.10.0'
  - '@astrojs/markdown-remark@7.2.0'
  - '@astrojs/mdx@6.0.1'
  - '@astrojs/react@5.0.6'
  - astro@6.4.2
